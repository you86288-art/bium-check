<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<title>잠은 고장나지 않는다 · 안전모드 연구소</title>
<style>
  :root{
    --cream:#FBF8F1; --paper:#FFFFFF; --beige:#F3ECDC; --line:#E7DCC6;
    --gold:#A8824A; --goldsoft:#C2A56E; --ink:#3A3329; --sub:#857B6A;
    --sage:#6E8B6A; --sagebg:#E8EEE5; --amber:#C0824A; --amberbg:#F4E7D6;
    --night:#43506B; --nightbg:#E6E9F0; --nightline:#D7DCE6;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--cream); color:var(--ink);
    font-family:"Pretendard",-apple-system,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    line-height:1.62; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:26px 18px 60px;}
  .eyebrow{font-size:12px;letter-spacing:3px;color:var(--gold);font-weight:700;margin-bottom:14px;}
  h1{font-size:30px;line-height:1.28;font-weight:800;letter-spacing:-.4px;margin-bottom:14px;}
  .lead{font-size:15px;color:var(--sub);margin-bottom:22px;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;}
  button{font:inherit;cursor:pointer;}
  .back{background:none;border:none;color:var(--sub);font-size:14px;font-weight:700;
    padding:0;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px;}
  .back:hover{color:var(--ink);}

  /* HUB */
  .hubcard{display:flex;align-items:center;gap:16px;width:100%;text-align:left;
    background:var(--paper);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:12px;transition:border-color .15s,transform .1s;}
  .hubcard:hover{border-color:var(--goldsoft);}
  .hubcard:active{transform:scale(.99);}
  .hubcard .ic{flex-shrink:0;width:48px;height:48px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;font-size:22px;}
  .hubcard .ht{display:block;font-size:17px;font-weight:800;margin-bottom:3px;}
  .hubcard .hd{display:block;font-size:13px;color:var(--sub);line-height:1.5;}
  .hubcard .ar{margin-left:auto;color:var(--goldsoft);font-size:20px;font-weight:800;flex-shrink:0;}

  /* INTRO boxes */
  .introbox{border-radius:18px;padding:18px;margin-bottom:24px;border:1px solid var(--line);background:var(--beige);}
  .introbox .h{font-size:14.5px;font-weight:700;margin-bottom:6px;}
  .introbox .p{font-size:14.5px;color:#5C5446;}
  .introbox b{color:var(--ink);}
  .nightbox{background:var(--nightbg);border:1px solid var(--nightline);border-radius:18px;padding:20px 18px;margin-bottom:24px;}
  .nightbox .lab{font-size:12px;letter-spacing:1.5px;color:var(--night);font-weight:800;margin-bottom:8px;}
  .nightbox .p{font-size:14.5px;color:#3F4658;line-height:1.72;}
  .nightbox .em{color:var(--night);font-weight:800;}
  .nightbox .div{margin-top:14px;padding-top:12px;border-top:1px solid var(--nightline);
    font-size:13.5px;color:var(--night);font-weight:700;}

  /* GROUPS / QUESTIONS */
  .grp{margin-bottom:22px;}
  .grphead{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .grphead .bar{width:4px;height:16px;border-radius:2px;background:var(--gold);}
  .grphead .t{font-size:15px;font-weight:800;letter-spacing:.5px;}
  .seclab{font-size:12px;letter-spacing:1.5px;color:var(--gold);font-weight:800;margin-bottom:14px;}
  .q{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;
    padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:var(--paper);
    color:var(--ink);margin-bottom:8px;transition:background .14s,border-color .14s;}
  .q .box{flex-shrink:0;width:24px;height:24px;border-radius:7px;border:1.5px solid #D6CBB4;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;
    color:#fff;margin-top:1px;transition:all .14s;}
  .q.on{background:var(--beige);border-color:var(--goldsoft);}
  .q.on .box{background:var(--gold);border-color:var(--gold);}
  .q .txt{font-size:15px;padding-top:1px;}
  .q .num{color:var(--sub);font-weight:700;margin-right:7px;}

  /* GAUGE */
  .gaugewrap{margin-top:4px;}
  .track{position:relative;height:14px;border-radius:999px;}
  .marker{position:absolute;top:50%;width:22px;height:22px;border-radius:999px;background:#fff;
    border:3px solid var(--ink);transform:translate(-50%,-50%);transition:left .28s ease;
    box-shadow:0 1px 4px rgba(0,0,0,.18);}
  .glab{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;font-weight:600;color:var(--sub);}

  .meter{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:18px 18px 16px;margin-top:8px;}
  .meter .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .meter .top .l{font-size:14px;color:var(--sub);font-weight:600;}
  .meter .top .n{font-size:15px;font-weight:800;}
  .meter .top .n b{color:var(--gold);font-size:22px;}
  .meter .top .n span{color:var(--sub);}
  .cta-btn{margin-top:18px;width:100%;padding:15px;border-radius:14px;border:none;
    background:var(--ink);color:#F6EFDF;font-size:16px;font-weight:800;letter-spacing:.5px;}

  /* RESULT */
  .result{margin-top:30px;}
  .rescard{border-radius:20px;padding:24px 20px;border:1px solid var(--line);}
  .rescard .k{font-size:12px;letter-spacing:2px;font-weight:800;margin-bottom:8px;}
  .rescard .tag{font-size:23px;font-weight:800;letter-spacing:-.3px;line-height:1.3;margin-bottom:4px;}
  .rescard .cnt{font-size:13.5px;color:var(--sub);margin-bottom:16px;}
  .rescard .body{font-size:15px;color:#544C3E;margin-top:20px;}
  .step{margin-top:18px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;}
  .step .h{font-size:12.5px;letter-spacing:1.5px;color:var(--gold);font-weight:800;margin-bottom:7px;}
  .step .s{font-size:15px;font-weight:600;}
  .note{font-size:12.5px;color:var(--sub);margin-top:16px;line-height:1.6;}

  /* ROUTINE (sleep) */
  .routine{margin-top:24px;}
  .routine .seclab{margin-bottom:6px;}
  .routine .sub{font-size:13.5px;color:var(--sub);margin-bottom:14px;}
  .rrow{display:flex;gap:12px;padding:13px 14px;border-radius:14px;background:var(--paper);
    border:1px solid var(--line);margin-bottom:8px;}
  .rrow .num{flex-shrink:0;width:22px;height:22px;border-radius:999px;background:var(--sagebg);
    color:var(--sage);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .rrow .rt{font-size:14.5px;font-weight:700;}
  .rrow .rd{display:block;font-size:13px;color:var(--sub);margin-top:2px;}
  .warn{margin-top:18px;background:#F6EEE9;border:1px solid #E8D8CC;border-radius:16px;padding:16px;}
  .warn .h{font-size:13px;font-weight:800;color:#A35F3C;margin-bottom:6px;}
  .warn .p{font-size:13px;color:#6A5A50;line-height:1.6;}

  /* CTA */
  .follow{margin-top:22px;background:var(--beige);border:1px solid var(--line);border-radius:18px;padding:20px 18px;text-align:center;}
  .follow .h{font-size:16px;font-weight:800;margin-bottom:6px;}
  .follow .d{font-size:14px;color:var(--sub);margin-bottom:14px;}
  .follow a{display:inline-block;background:var(--ink);color:#F6EFDF;border-radius:999px;
    padding:10px 22px;font-size:15px;font-weight:800;letter-spacing:.5px;text-decoration:none;}
  .reset{margin-top:16px;width:100%;padding:13px;border-radius:14px;border:1px solid var(--line);
    background:transparent;color:var(--sub);font-size:14px;font-weight:700;}
  .foot{margin-top:34px;text-align:center;font-size:12px;color:var(--goldsoft);letter-spacing:1px;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const PAGES = {
  safety: {
    eyebrow: "안전모드 연구소 · 자가진단",
    title: "나는 지금<br>생존모드일까?",
    lead: "20개 문항. 지금의 나에게 해당되면 가볍게 탭. 끝까지 다 안 맞아도 괜찮아.",
    icon: "🧭", iconBg: "#F4E7D6",
    hubTitle: "나는 지금 생존모드일까?",
    hubDesc: "20문항 · 신경계 과각성 자가진단",
    intro: '<div class="introbox"><div class="h">먼저, 한 가지만 약속.</div><div class="p">체크가 많아도 네가 고장 난 게 아니야. 그저 네 몸이 오래 안전을 못 느꼈다는 신호일 뿐. <b>비난은 패턴을 반복시키고, 설명은 패턴을 해체하니까.</b> 이건 채점이 아니라 지도야.</div></div>',
    groups: [
      ["몸의 신호", ["나도 모르게 어깨가 올라가 있다","턱이나 이를 꽉 물고 있을 때가 많다","숨이 얕고, 나도 모르게 숨을 참는다","쉬어도 몸이 회복되는 느낌이 없다","늘 피곤한데, 머리는 좀처럼 꺼지지 않는다"]],
      ["잠과 쉼", ["잠들기까지 시간이 오래 걸린다","쉬고 있어도 마음이 불안하다","아무것도 안 하고 가만히 있는 게 어렵다","할 일이 없으면 오히려 불안해진다","좋은 일이 생겨도 마음껏 누리지 못한다"]],
      ["마음의 경보", ["항상 ‘뭔가 잘못될 것 같은’ 느낌이 든다","작은 일에도 깜짝깜짝 놀란다","실수할까 봐 늘 긴장하고 있다","핸드폰을 의미 없이 계속 확인한다","남들만 잘 지내는 것 같아 자꾸 조급하다"]],
      ["관계와 주의", ["타인의 시선을 과하게 신경 쓴다","거절을 잘 하지 못한다","사람들과 있다 오면 완전히 방전된다","한 가지에 오래 집중하기 어렵다","멍하니 시간을 흘려보내고 자책한다"]]
    ],
    gauge: {left:"안전모드", right:"생존모드", leftColor:"var(--sage)", rightColor:"var(--amber)",
      grad:"linear-gradient(90deg,var(--sage) 0%,var(--goldsoft) 55%,var(--amber) 100%)"},
    meterLabel: "지금까지 체크",
    btn: "결과 보기",
    resKicker: "나의 지금 상태",
    result(n){
      if(n<=6) return {tag:"안전모드에 가까워요",tone:"var(--sage)",bg:"var(--sagebg)",
        body:"지금 너의 몸은 비교적 안전을 느끼고 있어. 가끔 경보가 켜져도 다시 가라앉힐 힘이 남아 있는 상태야. 이 감각을 기억해 둬 — 이게 ‘기준점’이 되니까.",

      if(n<=13) return {tag:"한 발은 생존모드",tone:"var(--amber)",bg:"var(--amberbg)",
        body:"위협이 사라졌는데도 경보가 잘 안 꺼지는 상태야. 네가 예민하거나 부족해서가 아니라, 몸이 ‘아직 안심해도 되는지’ 확신을 못 하고 있는 거야. 더 애쓰는 게 아니라, 안전 신호를 더 자주 주는 게 방향이야.",
        step:"지금 어깨 한 번 툭 내리고, 들숨보다 길게 — 천천히 내쉬는 숨 세 번."};
      return {tag:"지금, 깊은 생존모드",tone:"var(--amber)",bg:"var(--amberbg)",
        body:"몸이 오래도록 ‘긴장을 풀어도 안전하다’는 신호를 못 받은 것 같아. 이건 네가 고장 난 게 아니야. 이만큼 버텨 온 거야. 필요한 건 채찍이 아니라, 아주 작은 안심 한 조각씩이야.",
        step:"딱 한 가지만. 발바닥이 바닥에 닿는 감각에 10초 머물기. ‘지금 여긴 안전하다’ 한마디와 함께."};
    },
    stepKicker: "지금, 다음 한 걸음",
    note: "이 체크리스트는 진단이 아니라 자기이해를 돕는 지도예요. 지속적인 불면·불안이나 일상이 무너지는 느낌이 있다면, 혼자 해석하기보다 전문가의 도움을 받는 게 가장 안전한 길이에요.",
    follow: {h:"생존모드 → 안전모드, 같이 가요", d:"예민한 뇌(HSP·ADHD)를 위한 신경계 안전 연구를 매일 올려요."},
    foot: "몸이 먼저다 · 신경계가 먼저다 · 안전이 먼저다"
  },

  hsp: {
    eyebrow: "안전모드 연구소 · 자가진단",
    title: "나는<br>예민한 사람일까?",
    lead: "20개 문항. 평소의 나에게 해당되면 가볍게 탭. 정답도, 합격·불합격도 없어요.",
    icon: "🌿", iconBg: "#E8EEE5",
    hubTitle: "나는 예민한 사람일까?",
    hubDesc: "20문항 · HSP 감각처리민감성 자가진단",
    intro: '<div class="introbox"><div class="h">먼저, 이건 진단이 아니에요</div><div class="p">예민함은 ‘있다/없다’로 나뉘지 않아요. 누구나 이 연속선 위 어딘가에 있고, 점수는 그 <b>위치를 알려주는 단서</b>일 뿐이에요. 높다고 우월한 것도, 병든 것도 아니에요 — <b>그저 더 깊이 처리한다는 뜻.</b></div></div>',
    groups: [
      ["깊이 느끼고 음미한다", ["음악·영화·풍경에 마음이 깊이 흔들릴 때가 있다","작은 디테일이나 미묘한 변화를 남들보다 잘 알아챈다","결정을 내리기 전에 여러 경우를 깊이 곱씹는다","혼자 사색하거나 내면을 들여다보는 시간이 꼭 필요하다","한 공간의 분위기(긴장감·어색함)를 금방 알아챈다"]],
      ["쉽게 가득 찬다", ["한꺼번에 많은 일이 닥치면 머리가 금방 가득 찬다","짧은 시간에 할 일이 몰리면 압도당하는 느낌이 든다","시끄럽고 붐비는 곳에 오래 있으면 진이 빠진다","바쁜 하루 뒤엔 혼자 조용히 회복할 시간이 절실하다","갑작스러운 변화에 적응하는 데 시간이 더 걸린다"]],
      ["감각이 섬세하다", ["밝은 빛·큰 소리·강한 냄새가 남들보다 거슬린다","옷의 촉감·태그·소재에 예민하게 반응한다","배고픔·카페인·통증 같은 몸의 신호에 크게 반응한다","시계 초침, 형광등 같은 미묘한 자극도 신경이 쓰인다","온도·조명이 조금만 달라도 금방 알아챈다"]],
      ["감정과 공감이 깊다", ["남이 힘들어하면 내 일처럼 깊이 영향을 받는다","비판이나 지적을 오래 곱씹고 마음에 담아둔다","감동적인 이야기에 쉽게 눈물이 난다","갈등 상황의 긴장을 누구보다 빨리 감지한다","좋은 것도 나쁜 것도, 남들보다 더 진하게 느낀다"]]
    ],
    gauge: {left:"덜 민감", right:"더 깊이 처리", leftColor:"var(--sub)", rightColor:"var(--gold)",
      grad:"linear-gradient(90deg,var(--goldsoft) 0%,var(--gold) 100%)"},
    meterLabel: "지금까지 체크",
    btn: "결과 보기",
    resKicker: "연속선 위, 나의 위치",
    resKickerColor: "var(--sage)", resBg:"var(--sagebg)",
    result(n){
      if(n<=7) return {tag:"연속선의 한쪽 — 덜 민감한 편",tone:"var(--sage)",bg:"var(--sagebg)",
        body:"지금의 너는 자극을 비교적 가볍게 흘려보내는 쪽이야. 이건 ‘둔하다’가 아니라 그냥 다른 위치야. 예민함은 있고/없고로 나뉘지 않고, 누구나 이 선 위 어딘가에 있어. 네 자리는 여기쯤이라는 단서일 뿐.",

        step:"오늘 ‘몸이 편안하다’ 느낀 순간 하나를 알아차려, 그때 무엇이 달랐는지 기억해두기."};
      if(n<=13) return {tag:"균형이 한쪽으로 기우는 중",tone:"var(--amber)",bg:"var(--amberbg)",
        body:"위협이 없는데도 액셀(교감)이 잘 안 꺼지는 상태일 수 있어요. 증상이 몸 여기저기 흩어져 나타나는 건, 자율신경이 ‘전신을 조율하는’ 시스템이기 때문이에요. 고장이 아니라, 브레이크(부교감)를 켜주는 게 방향이에요.",
        step:"들숨보다 길게 — 천천히 내쉬는 숨 10번. 자율신경은 의지로 못 켜지만, 긴 날숨엔 반응해요."};
      return {tag:"오래 긴장 모드에 머문 편",tone:"var(--amber)",bg:"var(--amberbg)",
        body:"한 장기가 고장 난 게 아니라, 그 전부를 조율하는 시스템이 오래 기울어 있었던 것 같아요. 다만 이 점수는 진단이 아니에요. 비슷한 증상이 갑상선·빈혈·심장 같은 다른 원인일 수도 있으니, 지속된다면 병원에서 그 가능성부터 확인하는 게 안전해요.",
        step:"머리로 진정시키려 애쓰는 대신, 몸에 브레이크 신호를 — 긴 날숨, 따뜻한 샤워, 아침 햇빛, 일정한 기상 시각. 그리고 증상이 오래간다면 진료를 한번 받아봐."};
    },
    stepKicker: "의지가 아니라, 몸에 신호 보내기",
    note: "자율신경 증상은 갑상선·빈혈·심장 질환 등 다른 원인과 겹칠 수 있어요. 그래서 ‘자율신경 탓’으로 단정하기보다, 아래 신호가 있으면 병원 평가가 먼저예요 — 일어설 때 반복되는 심한 어지럼·실신, 가슴 통증·호흡곤란, 설명 없이 지속되는 만성 통증·피로, 일상이 무너질 정도의 증상. 이 체크는 진단이 아니라 자기이해를 돕는 지도예요.",
    follow: {h:"고장이 아니라, 균형 — 다시 맞추는 법", d:"교감과 부교감 사이 유연함을 되찾는 자율신경 회복 연구를 매일 올려요."},
    foot: "당신의 몸은 고장난 게 아니다 · 균형이 기울었을 뿐"
  }
};

const HANDLE_URL = "https://www.threads.net/@emotion_lab_bium";
const HANDLE = "@emotion_lab_bium";

/* ============ STATE ============ */
const state = { safety:new Set(), hsp:new Set(), sleep:new Set(), adhd:new Set(), auto:new Set(), shown:{} };

/* ============ HELPERS ============ */
const el = (s)=>document.getElementById(s);
const total = (p)=> p.groups.reduce((n,g)=>n+g[1].length,0);

function gaugeHTML(p, ratio){
  const pct = Math.round(ratio*100);
  return `<div class="gaugewrap">
    <div class="track" style="background:${p.gauge.grad}">
      <div class="marker" style="left:${pct}%"></div>
    </div>
    <div class="glab">
      <span style="color:${p.gauge.leftColor};font-weight:700">${p.gauge.left}</span>
      <span style="color:${p.gauge.rightColor};font-weight:700">${p.gauge.right}</span>
    </div>
  </div>`;
}

/* ============ HUB ============ */
function renderHub(){
  const order = ["safety","hsp","sleep"];
  let cards = order.map(k=>{
    const p = PAGES[k];
    return `<button class="hubcard" onclick="go('${k}')">
      <span class="ic" style="background:${p.iconBg}">${p.icon}</span>
      <span><span class="ht">${p.hubTitle}</span><span class="hd">${p.hubDesc}</span></span>
      <span class="ar">→</span>
    </button>`;
  }).join("");
  el("app").innerHTML = `
    <div class="eyebrow">안전모드 연구소 · 비움</div>
    <h1>지금 내 신경계는<br>어디에 있을까?</h1>
    <p class="lead">예민한 뇌(HSP·ADHD)를 위한 신경계 자가진단. 궁금한 걸 하나 골라보세요.</p>
    ${cards}
    <div class="follow" style="margin-top:24px">
      <div class="h">매일의 안전모드 연구</div>
      <div class="d">생존모드를 비우고, 안전모드를 채우는 법을 매일 올려요.</div>
      <a href="${HANDLE_URL}" target="_blank" rel="noopener">${HANDLE}</a>
    </div>
    <div class="foot">몸이 먼저다 · 신경계가 먼저다 · 안전이 먼저다</div>`;
  window.scrollTo(0,0);
}

/* ============ CHECK PAGE ============ */
function renderPage(key){
  const p = PAGES[key];
  const set = state[key];
  const t = total(p);

  let qhtml = "";
  let idx = 0;
  if(p.introSecLabel) qhtml += `<div class="seclab">${p.introSecLabel}</div>`;
  p.groups.forEach(([label, items])=>{
    qhtml += `<div class="grp"><div class="grphead"><span class="bar"></span><span class="t">${label}</span></div>`;
    items.forEach(text=>{
      idx++;
      const num = idx<10 ? "0"+idx : ""+idx;
      const on = set.has(idx);
      qhtml += `<button class="q ${on?'on':''}" onclick="toggle('${key}',${idx})">
        <span class="box">${on?'✓':''}</span>
        <span class="txt"><span class="num">${num}</span>${text}</span>
      </button>`;
    });
    qhtml += `</div>`;
  });

  const count = set.size;
  const ratio = count/t;

  el("app").innerHTML = `
    <a class="back" href="https://litt.ly/emotion_lab_bium">← 다른 진단 보기</a>
    <div class="eyebrow">${p.eyebrow}</div>
    <h1>${p.title}</h1>
    <p class="lead">${p.lead}</p>
    ${p.intro||""}
    ${p.introBlock||""}
    ${qhtml}
    <div class="meter">
      <div class="top">
        <span class="l">${p.meterLabel}</span>
        <span class="n"><b id="cnt">${count}</b><span> / ${t}</span></span>
      </div>
      <div id="gauge">${gaugeHTML(p, ratio)}</div>
      <button class="cta-btn" onclick="showResult('${key}')">${p.btn}</button>
    </div>
    <div id="resultSlot"></div>
    <div class="foot">${p.foot}</div>`;

  if(state.shown[key]) injectResult(key);
  window.scrollTo(0,0);
}

function toggle(key, i){
  const set = state[key];
  set.has(i) ? set.delete(i) : set.add(i);
  const p = PAGES[key];
  // update only the toggled button + meter (no full re-render = keeps scroll)
  const btns = document.querySelectorAll('.q');
  const on = set.has(i);
  // find by index order
  let idx=0;
  document.querySelectorAll('.q').forEach(b=>{
    idx++;
    if(idx===i){
      b.classList.toggle('on', on);
      b.querySelector('.box').textContent = on?'✓':'';
    }
  });
  el("cnt").textContent = set.size;
  el("gauge").innerHTML = gaugeHTML(p, set.size/total(p));
}

function showResult(key){
  state.shown[key] = true;
  injectResult(key);
  el("resultSlot").scrollIntoView({behavior:"smooth", block:"start"});
}

function injectResult(key){
  const p = PAGES[key];
  const set = state[key];
  const t = total(p);
  const count = set.size;
  const r = p.result(count);

  let extra = "";
  if(p.routine){
    let rit = p.routine.items.map((it,i)=>`
      <div class="rrow"><span class="num">${i+1}</span>
        <span><span class="rt">${it[0]}</span><span class="rd">${it[1]}</span></span></div>`).join("");
    extra = `<div class="routine">
      <div class="seclab">${p.routine.label}</div>
      <div class="sub">${p.routine.sub}</div>${rit}</div>${p.warn||""}`;
  } else {
    extra = `<div class="step"><div class="h">${p.stepKicker}</div><div class="s">${r.step}</div></div>`;
  }

  el("resultSlot").innerHTML = `
    <div class="result">
      <div class="rescard" style="background:${r.bg}">
        <div class="k" style="color:${r.tone}">${p.resKicker}</div>
        <div class="tag">${r.tag}</div>
        <div class="cnt">${t}개 중 ${count}개 ${key==='sleep'?'해당':'체크'}</div>
        ${gaugeHTML(p, count/t)}
        <div class="body">${r.body}</div>
        ${p.routine ? "" : `<div class="step"><div class="h">${p.stepKicker}</div><div class="s">${r.step}</div></div>`}
      </div>
      ${p.routine ? extra : ""}
      <div class="note">${p.note}</div>
      <div class="follow">
        <div class="h">${p.follow.h}</div>
        <div class="d">${p.follow.d}</div>
        <a href="${HANDLE_URL}" target="_blank" rel="noopener">${HANDLE}</a>
      </div>
      <button class="reset" onclick="resetPage('${key}')">다시 해보기</button>
    </div>`;
}

function resetPage(key){
  state[key] = new Set();
  state.shown[key] = false;
  renderPage(key);
}


renderPage('sleep');
</script>
</body>
</html>
